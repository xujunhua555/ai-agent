server:
  port: 8080
  servlet:
    context-path: /api

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/weekly_report?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: your_password
    driver-class-name: com.mysql.cj.jdbc.Driver
  mail:
    host: smtp.example.com
    port: 465
    username: your_email@example.com
    password: your_password
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
  ai:
    openai:
      api-key: your_api_key
      base-url: https://api.deepseek.com
      chat:
        options:
          model: deepseek-chat
    mcp:
      client:
        name: email-mcp-client
        version: 1.0.0
        request-timeout: 60s
        stdio:
          connections:
            email:
              command: "python"
              args:
                - "path/to/email_server.py"
              env:
                SMTP_SERVER: ${SMTP_SERVER:smtp.example.com}
                SMTP_PORT: ${SMTP_PORT:465}
                SMTP_USERNAME: ${SMTP_USERNAME:your_email@example.com}
                SMTP_PASSWORD: ${SMTP_PASSWORD:your_password}
                SENDER_NAME: ${SENDER_NAME:your_name}
                SMTP_USE_TLS: ${SMTP_USE_TLS:false}
          

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.weeklyreport.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

app:
  mcp:
    email-tool-name: send_email
    generate-email-tool-name: generate_and_send_email

logging:
  config: classpath:logback-spring.xml
